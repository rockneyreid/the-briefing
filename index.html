const TIERS = [
  { key: "dallas", label: "Dallas" },
  { key: "texas", label: "Texas" },
  { key: "us", label: "U.S." },
];

const LAYERS = [
  { key: "whoswho", label: "Who's Who" },
  { key: "howitworks", label: "How It Works" },
];

const TYPE_HINT = {
  single: "Think of the answer, then reveal.",
  list: "Try to recall the full list, then reveal.",
  ranked: "Try to recall them in order, then reveal.",
};

const STORAGE_KEY = "briefing-progress-v3";
const INTERVALS = [1, 2, 4, 9, 16]; // rounds until next review, indexed by box - 1
const ROUND_SIZE = 10; // facts per round (due facts first, new facts fill the rest)
const RECHECK_DAYS = { volatile: 100, stable: 730 }; // how long before a fact is flagged for a recheck

function tierLabel(key) {
  return (TIERS.find((t) => t.key === key) || {}).label || key;
}

function layerLabel(key) {
  return (LAYERS.find((l) => l.key === key) || {}).label || key;
}

function factLabel(fact) {
  return `${tierLabel(fact.tier)} · ${layerLabel(fact.layer)}`;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function addDays(dateStr, n) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}

function daysBetween(fromStr, toStr) {
  const a = new Date(fromStr + "T00:00:00");
  const b = new Date(toStr + "T00:00:00");
  return Math.round((b - a) / 86400000);
}

function isStale(fact) {
  return daysBetween(fact.lastVerified, todayStr()) > RECHECK_DAYS[fact.volatility];
}

function defaultProgress() {
  return { facts: {}, stats: { roundsCompleted: 0, lastSessionDate: null, streak: 0 } };
}

async function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {
    /* nothing saved yet */
  }
  return defaultProgress();
}

async function saveProgress(progress) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  } catch (e) {
    /* non-fatal: this session's progress just won't persist */
  }
}

function buildRound(progress) {
  const completed = progress.stats.roundsCompleted;
  const dueIds = FACTS.filter((f) => progress.facts[f.id] && progress.facts[f.id].dueAtRound <= completed).map((f) => f.id);
  const newIds = FACTS.filter((f) => !progress.facts[f.id]).map((f) => f.id);
  const due = shuffle(dueIds).slice(0, ROUND_SIZE);
  const budgetLeft = Math.max(0, ROUND_SIZE - due.length);
  const fresh = shuffle(newIds).slice(0, budgetLeft);
  return shuffle([...due, ...fresh]);
}

/* ============================================================
   STUDY ROUND — auto-built, interleaved, self-graded Leitner round.
   Rounds are counted, not dated — you can run one or several in a
   single sitting, or skip a day, and the schedule just tracks how
   many rounds a fact has waited, not how many calendar days.
   ============================================================ */

function StudyRound({ progress, onProgressChange }) {
  const [stage, setStage] = useState("start"); // start | reviewing | done
  const [queue, setQueue] = useState([]);
  const [index, setIndex] = useState(0);
  const [revealed, setRevealed] = useState(false);
  const [results, setResults] = useState([]);

  const round = useMemo(() => buildRound(progress), [progress]);

  function start() {
    setQueue(round);
    setIndex(0);
    setRevealed(false);
    setResults([]);
    setStage("reviewing");
  }

  function grade(correct) {
    const factId = queue[index];
    setResults((r) => [...r, { id: factId, correct }]);
    if (index + 1 < queue.length) {
      setIndex(index + 1);
      setRevealed(false);
    } else {
      finish([...results, { id: factId, correct }]);
    }
  }

  async function finish(finalResults) {
    const newRoundCount = progress.stats.roundsCompleted + 1;
    const facts = { ...progress.facts };
    finalResults.forEach(({ id, correct }) => {
      const rec = facts[id] || { box: 1 };
      const newBox = correct ? Math.min(5, (rec.box || 1) + 1) : 1;
      facts[id] = { box: newBox, dueAtRound: newRoundCount + INTERVALS[newBox - 1] };
    });

    const today = todayStr();
    const wasYesterday = progress.stats.lastSessionDate === addDays(today, -1);
    const wasToday = progress.stats.lastSessionDate === today;
    let streak = progress.stats.streak || 0;
    if (wasToday) {
      /* already logged today, streak unchanged */
    } else if (wasYesterday) {
      streak += 1;
    } else {
      streak = 1;
    }

    const updated = {
      facts,
      stats: { roundsCompleted: newRoundCount, lastSessionDate: today, streak },
    };
    await saveProgress(updated);
    onProgressChange(updated);
    setStage("done");
  }

  if (stage === "start") {
    if (round.length === 0) {
      return (
        <div className="panel">
          <p className="panel-copy">Nothing to review right now, and every fact has already been introduced.</p>
          <p className="panel-copy-muted">Switch to Browse to revisit anything, or check back once something's due again.</p>
        </div>
      );
    }
    const dueN = FACTS.filter((f) => progress.facts[f.id] && progress.facts[f.id].dueAtRound <= progress.stats.roundsCompleted).length;
    const inRoundDueN = Math.min(dueN, round.length);
    const freshN = round.length - inRoundDueN;
    return (
      <div className="panel">
        <p className="panel-copy">
          This round: <strong>{round.length} facts</strong> — {inRoundDueN} due for review, {freshN} new, mixed across categories.
        </p>
        <p className="panel-copy-muted">Reviews are prioritized first; new facts fill the rest.</p>
        <button className="primary-btn" onClick={start}>
          Start round
        </button>
      </div>
    );
  }

  if (stage === "reviewing") {
    const fact = FACTS.find((f) => f.id === queue[index]);
    return (
      <div className="panel">
        <div className="quiz-progress">
          <span>
            {index + 1} of {queue.length}
          </span>
          <span className="tab-flag">{factLabel(fact)}</span>
        </div>
        <h3 className="question-text">{fact.q}</h3>
        {!revealed && (
          <>
            <p className="type-hint">{TYPE_HINT[fact.type]}</p>
            <button className="primary-btn" onClick={() => setRevealed(true)}>
              Reveal answer
            </button>
          </>
        )}
        {revealed && (
          <div className="reveal-block">
            <AnswerDisplay fact={fact} />
            <p className="why-it-matters">{fact.whyItMatters}</p>
            <div className="grade-buttons">
              <button className="grade-btn grade-miss" onClick={() => grade(false)}>
                Missed it
              </button>
              <button className="grade-btn grade-got" onClick={() => grade(true)}>
                Got it
              </button>
            </div>
          </div>
        )}
      </div>
    );
  }

  // done
  const total = results.length;
  const correct = results.filter((r) => r.correct).length;

  return (
    <div className="panel">
      <h3 className="summary-score">
        {correct}/{total} <span className="summary-percent">remembered</span>
      </h3>
      <p className="panel-copy-muted">{progress.stats.roundsCompleted} rounds completed total</p>
      <button className="primary-btn" onClick={() => setStage("start")}>
        Back to start
      </button>
    </div>
  );
}

/* ============================================================
   BROWSE — ungraded preview, filterable by category, and a
   "needs a check" filter surfacing facts overdue for a recheck.
   ============================================================ */

function BrowseMode() {
  const [activeTier, setActiveTier] = useState("all");
  const [activeLayer, setActiveLayer] = useState("all");
  const [staleOnly, setStaleOnly] = useState(false);
  const [flipped, setFlipped] = useState(() => new Set());

  let visible = FACTS;
  if (activeTier !== "all") visible = visible.filter((f) => f.tier === activeTier);
  if (activeLayer !== "all") visible = visible.filter((f) => f.layer === activeLayer);
  if (staleOnly) visible = visible.filter(isStale);
  const staleTotal = FACTS.filter(isStale).length;

  function toggleFlip(id) {
    setFlipped((prev) => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
  }

  return (
    <>
      <div className="category-bar">
        <button className={"chip" + (activeTier === "all" ? " chip-active" : "")} onClick={() => setActiveTier("all")}>
          All places
        </button>
        {TIERS.map((t) => (
          <button key={t.key} className={"chip" + (activeTier === t.key ? " chip-active" : "")} onClick={() => setActiveTier(t.key)}>
            {t.label}
          </button>
        ))}
      </div>
      <div className="category-bar">
        <button className={"chip" + (activeLayer === "all" ? " chip-active" : "")} onClick={() => setActiveLayer("all")}>
          All layers
        </button>
        {LAYERS.map((l) => (
          <button key={l.key} className={"chip" + (activeLayer === l.key ? " chip-active" : "")} onClick={() => setActiveLayer(l.key)}>
            {l.label}
          </button>
        ))}
        {staleTotal > 0 && (
          <button className={"chip chip-stale" + (staleOnly ? " chip-active" : "")} onClick={() => setStaleOnly((v) => !v)}>
            Needs a check ({staleTotal})
          </button>
        )}
      </div>
      <div className="grid">
        {visible.map((f) => (
          <button key={f.id} className="card" onClick={() => toggleFlip(f.id)} aria-pressed={flipped.has(f.id)}>
            <span className="tab-flag card-flag">{factLabel(f)}</span>
            {isStale(f) && <span className="stale-badge">recheck</span>}
            <span className={"card-inner" + (flipped.has(f.id) ? " is-flipped" : "")}>
              <span className="card-face card-front">
                <span className="card-question">{f.q}</span>
                <span className="card-hint">tap to reveal</span>
              </span>
              <span className="card-face card-back">
                <AnswerDisplay fact={f} compact />
                <span className="card-detail">{f.whyItMatters}</span>
              </span>
            </span>
          </button>
        ))}
      </div>
    </>
  );
}

/* ============================================================
   SHARED — answer rendering by fact type
   ============================================================ */

function AnswerDisplay({ fact, compact }) {
  const cls = "card-answer" + (compact ? " card-answer-compact" : "");
  if (fact.type === "list") {
    return (
      <ul className={cls + " answer-list"}>
        {fact.a.map((item) => (
          <li key={item}>{item}</li>
        ))}
      </ul>
    );
  }
  if (fact.type === "ranked") {
    return (
      <ol className={cls + " answer-list"}>
        {fact.a.map((item) => (
          <li key={item}>{item}</li>
        ))}
      </ol>
    );
  }
  return <div className={cls}>{fact.a}</div>;
}
